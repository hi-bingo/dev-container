services:
  dev:
    image: ghcr.io/hi-bingo/dev-container:latest
    pull_policy: always
    stdin_open: true
    tty: true
    user: root
    working_dir: /workspace
    ports:
      - "8022:22"
      - “8000-8020:8000-8020”
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.claude:/root/.claude
