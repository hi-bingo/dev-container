services:
  dev:
    image: ${DEV_CONTAINER_IMAGE:-ghcr.io/hi-bingo/dev-container:latest}
    pull_policy: always
    stdin_open: true
    tty: true
    user: root
    working_dir: /workspace
    env_file:
      - .env
    environment:
      HOME: /root
    ports:
      - "2828:22"
    volumes:
      - ${WORKSPACE_DIR:-.}:/workspace
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.cc-connect:/root/.cc-connect
