services:
  dev:
    image: ${DEV_CONTAINER_IMAGE:-ghcr.io/hi-bingo/dev-container:latest}
    pull_policy: always
    stdin_open: true
    tty: true
    working_dir: /workspace
    env_file:
      - .env
    environment:
      HOME: /home/dev
    volumes:
      - ${WORKSPACE_DIR:-.}:/workspace
      - ${HOME}/.ssh:/home/dev/.ssh:ro
      - ${HOME}/.gitconfig:/home/dev/.gitconfig:ro
      - ${HOME}/.codex:/home/dev/.codex
      - ${HOME}/.claude:/home/dev/.claude
